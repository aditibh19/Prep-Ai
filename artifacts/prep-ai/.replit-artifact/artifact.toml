kind = "web"
previewPath = "/"
title = "PrepAI – AI Placement Mentor"
version = "1.0.0"
id = "artifacts/prep-ai"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20314

[services.development]
run = "pnpm --filter @workspace/prep-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prep-ai", "run", "build" ]
serve = "static"
publicDir = "artifacts/prep-ai/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20314"
BASE_PATH = "/"
